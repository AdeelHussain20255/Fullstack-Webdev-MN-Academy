<!-- -------------------------- Same-Page Jump -------------------------- -->
<!-- ------------------------------------------------------------------------------------------------------------------------
    When you have a very long webpage, you want users to be able to click a link and immediately zip down to a specific section
    To make this happen use identifier called id attribute.
Example: -------------------------------------------------------------------------------------------------------------------->
    <h2 id="biryani-ingredients">Ingredients Needed for Biryani</h2>

<!-- ---------------------------------------------------------------------------------------------------------------------------
Rule:
    id must be completely unique. No two elements on the same webpage can share the exact same id name. 
 
Now, create a normal <a> tag, but inside the href, type a hashtag # followed 
    by the exact id name you created in Step 1. 
    The hashtag tells the browser: "Look for an ID on this current page." 
------------------------------------------------------------------------------------------------------------------------------>
    <a href="#biryani-ingredients">Jump Straight to Ingredients</a>
<!-- ----------------------------------------------------------------- -->
